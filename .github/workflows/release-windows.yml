name: release windows

on:
  push:
    tags:
      - "release-*"
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout Forge
        uses: actions/checkout@v4
        with:
          repository: razterizer/forge
          ref: release-0.8.1
          path: .forge-bootstrap

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build Forge
        run: >-
          cmake -S .forge-bootstrap -B .forge-bootstrap/build -G Ninja
          -DCMAKE_BUILD_TYPE=Release -DFORGE_BUILD_TESTS=OFF -DCMAKE_CXX_COMPILER=cl
          && cmake --build .forge-bootstrap/build

      - name: Prepare hosted release assets
        id: prepare
        continue-on-error: true
        shell: pwsh
        run: |
          ./.forge-bootstrap/build/forge.exe workflow prepare-release 2>&1 | Tee-Object -FilePath forge-prepare-release.log
          exit $LASTEXITCODE

      - name: Upload prepare log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forge-prepare-release-log
          path: forge-prepare-release.log
          retention-days: 1

      - name: Check prepare result
        if: steps.prepare.outcome != 'success'
        shell: pwsh
        run: exit 1

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: .forge/release/*.zip,boxes/*.cbox,boxes/*.sha256
          bodyFile: .forge/release/RELEASE_NOTES.md
          tag: ${{ github.ref_name }}
