name: release linux

on:
  push:
    tags:
      - "release-*"
      - "v*"

permissions:
  contents: write

jobs:
  forge-release-boxes:
    # forge-managed: release-boxes@3
    name: Publish Forge cboxes
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve latest Forge release
        id: forge-release
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: >-
            return (await github.rest.repos.getLatestRelease({
            owner: 'razterizer', repo: 'forge' })).data.tag_name
      - name: Checkout Forge
        uses: actions/checkout@v4
        with:
          repository: razterizer/forge
          ref: ${{ steps.forge-release.outputs.result }}
          path: .forge-bootstrap
      - name: Install OpenAL Soft
        run: sudo apt-get update && sudo apt-get install -y libopenal-dev
      - name: Build Forge
        run: >-
          cmake -S .forge-bootstrap -B .forge-bootstrap/build -G Ninja
          -DCMAKE_BUILD_TYPE=Release -DFORGE_BUILD_TESTS=OFF
          && cmake --build .forge-bootstrap/build
      - name: Prepare Forge release boxes
        run: |
          set -eux
          ./.forge-bootstrap/build/forge workflow prepare-release --skip-unsupported || {
            find .forge -maxdepth 4 -type f -print || true
            find boxes -maxdepth 2 -type f -print || true
            exit 1
          }
      - name: Publish Forge release boxes
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: boxes/*.cbox,boxes/*.sha256
          tag: ${{ github.ref_name }}
