#:schema https://raw.githubusercontent.com/razterizer/forge/main/schemas/forge.recipe.schema.json

[project]
name = "AudioLibSwitcher_OpenAL"
version = "1.0.0"
type = "header_only"
cpp_std = 20

[sources]
paths = []
public_headers = ["include/AudioLibSwitcher/AudioLibSwitcher_OpenAL.h"]
include_dirs = ["AudioLibSwitcher/include"]

[build]
number = 1

[release]
build_number_format = "dotted"

[dependencies]
3rdparty_OpenAL = { path = "../3rdparty_OpenAL" }

# TODO: Replace local dependencies with reproducible workflow dependencies.
# [profile.workflow-release.dependencies]
# 3rdparty_OpenAL = { github = "owner/3rdparty_OpenAL", version = "<published-version>" }

[profile.workflow-release.build]
configuration = "Release"

[profile.Debug.build]
configuration = "Debug"
defines = ["DEBUG=1"]

[profile.Release.build]
configuration = "Release"
